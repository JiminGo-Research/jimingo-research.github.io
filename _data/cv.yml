        - "Co-authored GOMACTech 2026: <em>SHIELD USA: Leap-ahead Organic Substrate Enabled by Fan-Out Technology, Domestic Materials, Process Innovations, and Novel EDA Workflows</em>"
    - title: Physics-Aware Neural Operator for Thermal Design Optimization in Advanced Packaging
      institution: Arizona State University
      year: Mar 2026 –
      description:
        - Developing a physics-informed ML framework for microchannel geometry generation targeting thermal management in 2.5D SiP and 3D-IC packaging
        - Automated end-to-end PyFluent/Ansys CFD simulation workflows to generate training data for ML-guided design-space exploration
        - Designing a physics-aware inverse modeling pipeline combining a diffusion model and Fourier Neural Operator (FNO)
    - title: "Agentic AI: Towards Robust GUI Agents"
