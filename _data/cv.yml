    - title: Graduate Research Assistant — <a href="https://microelectronics.asu.edu/shield-usa/">SHIELD-USA</a>
      institution: Arizona State University / Synopsys / Deca Technologies
      year: Aug 2025 –
      description:
        - Executed full RTL-to-GDSII physical design for an RDL fan-out test vehicle — monitor design, floorplanning, timing-driven placement and routing using Synopsys 3DIC Compiler
